name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the release as a DRAFT up front, so the platform jobs only ever
  # upload to it. They run in parallel and independently; the release stays
  # hidden until the publish job flips it, once both platforms have succeeded.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the draft release if it does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A tag with a hyphen is a semver pre-release (v0.1.0-rc1); mark it so
          # it never shows up as the latest release.
          prerelease=""
          case "$GITHUB_REF_NAME" in
            *-*) prerelease="--prerelease" ;;
          esac
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --draft $prerelease --title "SideScopes $GITHUB_REF_NAME" --generate-notes

  macos:
    needs: create-release
    runs-on: macos-latest
    # The secrets context is not allowed in step conditions; these flags
    # carry the presence checks somewhere it is.
    env:
      HAS_SIGNING_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
      HAS_NOTARIZATION_ID: ${{ secrets.APPLE_NOTARIZATION_ID != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Configure
        run: cmake -B build -DSIDESCOPES_WERROR=ON -DSIDESCOPES_CODESIGN_IDENTITY=-

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      # With a Developer ID certificate in the secrets, the bundle is
      # signed with the hardened runtime, notarized, and stapled. Without
      # one, the ad-hoc build ships as-is and Gatekeeper asks users to
      # right-click and open; see docs/RELEASING.md.
      - name: Sign with Developer ID
        if: ${{ env.HAS_SIGNING_CERTIFICATE == 'true' }}
        env:
          CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          echo "$CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" build/SideScopes.app
          rm certificate.p12

      - name: Notarize
        if: ${{ env.HAS_NOTARIZATION_ID == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent build/SideScopes.app notarize.zip
          xcrun notarytool submit notarize.zip --wait \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM"
          xcrun stapler staple build/SideScopes.app

      - name: Package
        run: |
          ditto -c -k --keepParent build/SideScopes.app SideScopes-${GITHUB_REF_NAME}-macos.zip
          shasum -a 256 SideScopes-${GITHUB_REF_NAME}-macos.zip > \
            SideScopes-${GITHUB_REF_NAME}-macos.zip.sha256

      - name: Upload macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            SideScopes-${GITHUB_REF_NAME}-macos.zip \
            SideScopes-${GITHUB_REF_NAME}-macos.zip.sha256 --clobber

  windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure
        # Static CRT so the packaged .exe runs without a Visual C++
        # redistributable; it applies to the fetched dependencies too.
        run: cmake -B build -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $zip = "SideScopes-$env:GITHUB_REF_NAME-windows.zip"
          Compress-Archive -Path build/Release/SideScopes.exe -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File -Encoding ascii "$zip.sha256"

      - name: Upload Windows assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $zip = "SideScopes-$env:GITHUB_REF_NAME-windows.zip"
          gh release upload "$env:GITHUB_REF_NAME" $zip "$zip.sha256" --clobber

  # Flip the draft to published only after both platform jobs succeed. Because
  # this depends on both, GitHub's "Re-run failed jobs" re-runs it (a skipped
  # dependent) once a previously-failed platform is re-run and passes.
  publish:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
