name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: |
          files=$(git ls-files '*.h' '*.cpp' '*.mm')
          clang-format-18 --dry-run --Werror $files
      - name: Install lizard
        run: pipx install lizard
      - name: Check complexity
        # Every function in src stays within cyclomatic complexity 15 and 60
        # lines; -w exits non-zero on any function that exceeds either. tests/
        # is excluded because the Catch2 macros inflate the numbers.
        run: lizard src -C 15 -L 60 -w

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-18
      - name: Configure
        run: cmake -B build
      - name: Analyze
        run: |
          # tests/ui is the optional UI-test target; test_windows_platform.cpp
          # includes <windows.h>. Both are absent from this Linux compile
          # database, so clang-tidy cannot parse them here.
          # module_loader.cpp compiles only in the dynamic configuration, so it
          # is absent from this build's compile database.
          files=$(git ls-files 'src/core/*.cpp' 'src/core/**/*.cpp' 'src/modules/*.cpp' 'tests/*.cpp' ':(exclude)tests/ui/*' ':(exclude)tests/test_windows_platform.cpp' ':(exclude)src/modules/module_loader.cpp')
          clang-tidy-18 -p build --quiet $files

  tidy-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-tidy
        run: brew install llvm@22
      - name: Build
        # UI tests ON so the one compile database also covers tests/ui. The
        # generated version header and the fetched ImGui headers must exist
        # before clang-tidy can parse the app layer.
        run: |
          cmake -B build -DSIDESCOPES_UI_TESTS=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build
      - name: Analyze
        # The app layer, the macOS platform sources, and the UI tests build only
        # on APPLE, so they are absent from the Linux tidy job's compile database
        # - this is where they get their clang-tidy coverage. Homebrew clang-tidy
        # needs the SDK sysroot that Apple clang knows implicitly; -Wno-c2y is for
        # the test files, whose Catch2/test-engine macros use __COUNTER__ (a no-op
        # for the non-test sources).
        run: |
          files=$(git ls-files 'src/app/*.cpp' 'src/platform/macos/*.mm' 'tests/ui/*.cpp')
          "$(brew --prefix llvm@22)/bin/clang-tidy" -p build --quiet \
            --extra-arg=-isysroot --extra-arg="$(xcrun --show-sdk-path)" \
            --extra-arg=-Wno-c2y-extensions $files

  tidy-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure with Ninja for a compile database
        # The Visual Studio generator emits no compile_commands.json; Ninja with
        # the MSVC toolchain does, and clang-tidy reads the cl-style entries.
        run: cmake -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Build
        run: cmake --build build
      - name: Analyze
        shell: bash
        # src/platform/windows builds only on WIN32 and pulls in <windows.h>,
        # so it is absent from the other tidy jobs' compile databases. The
        # clang static analyzer is excluded here: on WinRT/COM async code it
        # produces false positives that vary with the SDK and clang version, so
        # it is not reproducible between this runner and the denwin gate. The
        # stable lint checks - which caught the real findings - still run.
        # -Wno-unused-command-line-argument drops MSVC's /MP, which the compile
        # database carries but clang-tidy's clang-cl parse ignores.
        run: |
          files=$(git ls-files 'src/platform/windows/*.cpp')
          clang-tidy -p build --checks='-clang-analyzer-*' \
            --extra-arg=-Wno-unused-command-line-argument $files

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: cmake -B build -DSIDESCOPES_WERROR=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --timeout 120

  # The dynamic module configuration loads the built-in scopes as shared
  # objects through the real loader instead of linking them in. Linux exercises
  # it on every push so the loader path and the module boundary stay honest;
  # the Windows dynamic link is verified out of band.
  test-dynamic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: cmake -B build -DSIDESCOPES_WERROR=ON -DSIDESCOPES_MODULES_DYNAMIC=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --timeout 120

  # Address+UB and thread sanitizers exercise the test suite; the analysis
  # worker's lock-free frame handoff is exactly what TSan exists to audit.
  sanitize:
    strategy:
      fail-fast: false
      matrix:
        sanitizer: ["address,undefined", "thread"]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: >
          cmake -B build -DSIDESCOPES_WERROR=ON
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DSIDESCOPES_SANITIZE=${{ matrix.sanitizer }}
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120
