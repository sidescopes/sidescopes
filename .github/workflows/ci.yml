name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: |
          files=$(git ls-files '*.h' '*.cpp' '*.mm')
          clang-format-18 --dry-run --Werror $files

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-18
      - name: Configure
        run: cmake -B build
      - name: Analyze
        run: |
          # tests/ui is the optional UI-test target; test_windows_platform.cpp
          # includes <windows.h>. Both are absent from this Linux compile
          # database, so clang-tidy cannot parse them here.
          files=$(git ls-files 'src/core/*.cpp' 'src/core/**/*.cpp' 'tests/*.cpp' ':(exclude)tests/ui/*' ':(exclude)tests/test_windows_platform.cpp')
          clang-tidy-18 -p build --quiet $files

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: cmake -B build -DSIDESCOPES_WERROR=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # Address+UB and thread sanitizers exercise the test suite; the analysis
  # worker's lock-free frame handoff is exactly what TSan exists to audit.
  sanitize:
    strategy:
      fail-fast: false
      matrix:
        sanitizer: ["address,undefined", "thread"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: >
          cmake -B build -DSIDESCOPES_WERROR=ON
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DSIDESCOPES_SANITIZE=${{ matrix.sanitizer }}
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
